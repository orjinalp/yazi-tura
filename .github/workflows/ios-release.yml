name: iOS Release (App Store)

# Windows/tarayıcıdan çalıştırılır: Actions ▸ "iOS Release (App Store)" ▸ Run workflow.
# Bulut macOS runner'ında: web'i senkronlar, Xcode projesini üretir, imzalar,
# .ipa arşivler ve App Store Connect'e (TestFlight işleme) yükler.
#
# Gerekli GitHub Secrets (Settings ▸ Secrets and variables ▸ Actions):
#   ASC_KEY_ID          — App Store Connect API anahtarının Key ID'si
#   ASC_ISSUER_ID       — API anahtarının Issuer ID'si
#   ASC_KEY_P8_BASE64   — .p8 anahtar dosyasının base64 hali (aşağıda nasıl olduğu README'de)
#   IOS_DIST_CERT_P12_BASE64 — Apple Distribution sertifikasının .p12 export'u (base64)
#   IOS_DIST_CERT_P12_PASSWORD — .p12 export parolası

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    # App Store Connect iOS 26 SDK istediği için Xcode 26 varsayılanlı macOS 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Xcode sürümünü göster
        run: xcodebuild -version

      - name: XcodeGen kur
        run: brew install xcodegen

      - name: Web'i senkronla + projeyi üret
        working-directory: ios-app
        run: |
          chmod +x sync-web.sh
          ./sync-web.sh
          xcodegen generate

      - name: API anahtarını (.p8) hazırla
        working-directory: ios-app
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_P8_BASE64" ]; then
            echo "::error::ASC_KEY_P8_BASE64 secret'i boş. App Store Connect API anahtarını (.p8) ekle (base64 önerilir)."
            exit 1
          fi
          mkdir -p fastlane
          # Secret ham .p8 (PEM) de olabilir, base64 de — ikisini de kabul et.
          if printf '%s' "$ASC_KEY_P8_BASE64" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "$ASC_KEY_P8_BASE64" > fastlane/AuthKey.p8
          else
            printf '%s' "$ASC_KEY_P8_BASE64" | base64 --decode > fastlane/AuthKey.p8 2>/dev/null || true
          fi
          if ! grep -q "BEGIN PRIVATE KEY" fastlane/AuthKey.p8; then
            echo "::error::Anahtar geçerli bir .p8 değil. Secret'a ya ham .p8 metnini ya da 'base64' halini yapıştır (README'deki PowerShell komutu)."
            exit 1
          fi
          echo "ASC_KEY_PATH=$(pwd)/fastlane/AuthKey.p8" >> "$GITHUB_ENV"
          echo "API anahtarı hazır ($(wc -c < fastlane/AuthKey.p8) bayt)."

      - name: Apple Distribution sertifikasını içe aktar
        working-directory: ios-app
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: yazi-tura-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          if [ -z "$IOS_DIST_CERT_P12_BASE64" ]; then
            echo "::error::IOS_DIST_CERT_P12_BASE64 secret'i boş. Apple Distribution .p12 sertifikasını base64 olarak ekle."
            exit 1
          fi
          if [ -z "$IOS_DIST_CERT_P12_PASSWORD" ]; then
            echo "::error::IOS_DIST_CERT_P12_PASSWORD secret'i boş. .p12 export parolasını ekle."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/apple_distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_DIST_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Kimlik değerlerini doğrula (maskesiz parça)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo "KEY_ID  : uzunluk=${#ASC_KEY_ID}  bas=${ASC_KEY_ID:0:3}  son=${ASC_KEY_ID: -3}   (beklenen: 10 / 3XX / D46)"
          echo "ISSUER  : uzunluk=${#ASC_ISSUER_ID}  bas=${ASC_ISSUER_ID:0:3}  son=${ASC_ISSUER_ID: -3}   (beklenen: 36 / 12a / e3a)"

      - name: Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios-app

      - name: fastlane ile derle ve yükle
        working-directory: ios-app
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane release

      - name: Arşiv/ipa'yı çıktı olarak sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yazitura-ipa
          path: ios-app/build/*.ipa
          if-no-files-found: ignore
