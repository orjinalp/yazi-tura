name: iOS Release (App Store)

# Windows/tarayıcıdan çalıştırılır: Actions ▸ "iOS Release (App Store)" ▸ Run workflow.
# Bulut macOS runner'ında: web'i senkronlar, Xcode projesini üretir, imzalar,
# .ipa arşivler ve App Store Connect'e (TestFlight işleme) yükler.
#
# Gerekli GitHub Secrets (Settings ▸ Secrets and variables ▸ Actions):
#   ASC_KEY_ID          — App Store Connect API anahtarının Key ID'si
#   ASC_ISSUER_ID       — API anahtarının Issuer ID'si
#   ASC_KEY_P8_BASE64   — .p8 anahtar dosyasının base64 hali (aşağıda nasıl olduğu README'de)

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    # macos-15 imajının varsayılan Xcode'u 16.x (App Store, iOS 18 SDK / Xcode 16 ister)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Xcode sürümünü göster
        run: xcodebuild -version

      - name: XcodeGen kur
        run: brew install xcodegen

      - name: Web'i senkronla + projeyi üret
        working-directory: ios-app
        run: |
          chmod +x sync-web.sh
          ./sync-web.sh
          xcodegen generate

      - name: API anahtarını (.p8) hazırla
        working-directory: ios-app
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_P8_BASE64" ]; then
            echo "::error::ASC_KEY_P8_BASE64 secret'i boş. App Store Connect API anahtarını (.p8) ekle (base64 önerilir)."
            exit 1
          fi
          mkdir -p fastlane
          # Secret ham .p8 (PEM) de olabilir, base64 de — ikisini de kabul et.
          if printf '%s' "$ASC_KEY_P8_BASE64" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "$ASC_KEY_P8_BASE64" > fastlane/AuthKey.p8
          else
            printf '%s' "$ASC_KEY_P8_BASE64" | base64 --decode > fastlane/AuthKey.p8 2>/dev/null || true
          fi
          if ! grep -q "BEGIN PRIVATE KEY" fastlane/AuthKey.p8; then
            echo "::error::Anahtar geçerli bir .p8 değil. Secret'a ya ham .p8 metnini ya da 'base64' halini yapıştır (README'deki PowerShell komutu)."
            exit 1
          fi
          echo "ASC_KEY_PATH=$(pwd)/fastlane/AuthKey.p8" >> "$GITHUB_ENV"
          echo "API anahtarı hazır ($(wc -c < fastlane/AuthKey.p8) bayt)."

      - name: Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios-app

      - name: fastlane ile derle ve yükle
        working-directory: ios-app
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane release

      - name: Arşiv/ipa'yı çıktı olarak sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yazitura-ipa
          path: ios-app/build/*.ipa
          if-no-files-found: ignore
