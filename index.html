<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yazı Tura">
<title>Yazı Tura</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- Hamburger menü butonu (üst sol) -->
<button id="menuBtn" aria-label="Menü">
  <span></span><span></span><span></span>
</button>

<!-- Menü katmanı (soldan açılan çekmece) -->
<div id="menuOverlay" class="hidden" aria-hidden="true">
  <aside id="menuPanel" role="dialog" aria-label="Menü">
    <header id="menuHeader">
      <button id="menuBack" class="icon-btn hidden" aria-label="Geri">‹</button>
      <h2 id="menuTitle">Menü</h2>
      <button id="menuClose" class="icon-btn" aria-label="Kapat">×</button>
    </header>
    <div id="menuBody"></div>
  </aside>
</div>

<script src="leaderboard.js"></script>
<script src="game.js"></script>
<script src="menu.js"></script>
</body>
</html>
